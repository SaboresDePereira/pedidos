<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabores de Pereira - En construcción</title>
    <link rel="icon" href="TFG.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: linear-gradient(180deg, #121212 0%, #1f1f1f 100%);
            color: white;
            text-align: center;
        }
        .construction-card {
            max-width: 640px;
            width: 100%;
            padding: 30px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .construction-card h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 4vw, 3.4rem);
            letter-spacing: 0.03em;
        }
        .construction-card p {
            margin: 18px 0 24px;
            font-size: 1.05rem;
            line-height: 1.75;
            color: #d8d8d8;
        }
        .construction-card a {
            display: inline-block;
            padding: 14px 24px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            background: #ff3b3b;
            color: white;
            transition: transform 0.2s ease, filter 0.2s ease;
        }
        .construction-card a:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .construction-card .icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="construction-card">
        <div class="icon">🚧</div>
        <h1>Menú en Construcción</h1>
        <p>Estamos trabajando en el menú de Sabores de Pereira para ofrecerte la mejor experiencia. Vuelve pronto, ¡muy pronto tendremos todo listo!</p>
        <a href="index.html">Volver al inicio</a>
    </div>
</body>
</html>
